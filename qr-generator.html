<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Payment Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #059669; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Premium Card Design */
        #card { 
            background: linear-gradient(180deg, #059669 0%, #064e3b 100%); 
            color: white; padding: 30px; border-radius: 25px; text-align: center; margin-top: 20px; position: relative;
        }
        .card-header { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .card-sub { font-size: 14px; opacity: 0.9; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .qr-frame { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin-top: 20px; }
        .qr-frame img { width: 180px; height: 180px; display: block; }
        .footer-text { margin-top: 15px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="bizName" placeholder="Business Name (e.g. Swift Store)">
    <input type="text" id="ownName" placeholder="Owner Name">
    <input type="text" id="bankName" placeholder="Bank Name">
    <input type="text" id="accNum" placeholder="Account Number">
    <button class="btn" onclick="generate()">Create Professional Card</button>

    <div id="result-section" style="display:none;">
        <div id="card">
            <div class="card-header" id="out-biz"></div>
            <div class="card-sub">THANK YOU FOR YOUR PAYMENT</div>
            <div class="info-row"><span>Owner</span> <span id="out-own"></span></div>
            <div class="info-row"><span>Bank</span> <span id="out-bank"></span></div>
            <div class="info-row"><span>Account</span> <span id="out-acc"></span></div>
            <div class="qr-frame">
                <img id="qr-img" src="" onerror="nextProvider(this)">
            </div>
            <div class="footer-text">SCAN & PAY - SAFE & RELIABLE</div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" onclick="down()" style="background:#2563eb;">Download</button>
            <button class="btn" onclick="share()" style="background:#7c3aed;">Share</button>
        </div>
    </div>
</div>

<script>
    let pIdx = 0;
    const providers = [
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://quickchart.io/qr?text=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl="
    ];

    function generate() {
        document.getElementById("out-biz").innerText = document.getElementById("bizName").value;
        document.getElementById("out-own").innerText = document.getElementById("ownName").value;
        document.getElementById("out-bank").innerText = document.getElementById("bankName").value;
        document.getElementById("out-acc").innerText = document.getElementById("accNum").value;
        
        const payload = `Store: ${document.getElementById("bizName").value}, Bank: ${document.getElementById("bankName").value}, A/C: ${document.getElementById("accNum").value}`;
        document.getElementById("qr-img").src = providers[0] + encodeURIComponent(payload);
        document.getElementById("result-section").style.display = "block";
    }

    function nextProvider(img) {
        pIdx++;
        if(pIdx < providers.length) img.src = providers[pIdx] + encodeURIComponent("Retry");
    }

    async function down() {
        const canvas = await html2canvas(document.getElementById("card"));
        const link = document.createElement("a");
        link.download = "My-Payment-Card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    async function share() {
        const canvas = await html2canvas(document.getElementById("card"));
        canvas.toBlob(blob => {
            const file = new File([blob], "card.png", {type: "image/png"});
            if (navigator.share) navigator.share({files: [file]});
        });
    }
</script>
</body>
</html>
