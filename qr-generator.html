<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business QR Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: #1e293b; padding: 25px; border-radius: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #qrcode { margin-top: 20px; background: white; padding: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <h1>Business QR Card</h1>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="shop" placeholder="Shop/Company Name">
    <input type="text" id="phone" placeholder="Mobile Number">
    <input type="text" id="email" placeholder="Email Address">
    <input type="file" id="logoInput" accept="image/*">
    <button onclick="generateBusinessQR()">Create Business QR</button>

    <div id="qrcode"></div>
</div>

<script>
    function generateBusinessQR() {
        const name = document.getElementById('name').value;
        const shop = document.getElementById('shop').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        
        // vCard فارمیٹ (کانٹیکٹ سیو کرنے کے لیے)
        const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${name}
ORG:${shop}
TEL:${phone}
EMAIL:${email}
END:VCARD`;

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), {
            text: vcard,
            width: 200,
            height: 200
        });
    }
</script>
</body>
</html>
