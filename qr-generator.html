<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b1120; color: #fff; padding: 20px; text-align: center; }
        .box { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; color: white; cursor: pointer; }
        #qrcode { margin-top: 20px; background: white; padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="box">
        <h1>QR Generator</h1>
        <input type="text" id="text" placeholder="Enter link...">
        <button onclick="gen()">Generate</button>
        <div id="qrcode"></div>
        <br><br>
        <a href="index.html" style="color:white;">Back Home</a>
    </div>
    <script>
        function gen() {
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), document.getElementById("text").value);
        }
    </script>
</body>
</html>
