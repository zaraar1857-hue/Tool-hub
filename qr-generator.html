<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Premium Payment QR Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: none; background: #f0f9ff; color: #0f172a; font-size: 15px; box-sizing: border-box; font-weight: 500; }
        .btn-gen { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; color: #0f172a; margin-top: 5px; }
        
        #result-section { margin-top: 25px; display: none; }
        
        /* Premium Output Card - Styled like Screenshot_20260625-002706.png */
        #capture-area { 
            background: #059669; color: #ffffff; padding: 35px 25px; border-radius: 20px; width: 340px; text-align: center; margin: auto;
        }
        #capture-area h2 { margin: 0 0 5px 0; font-size: 24px; text-transform: uppercase; }
        #capture-area h4 { margin: 0 0 15px 0; font-size: 14px; font-weight: 400; }
        .payment-info { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; }
        .payment-info p { margin: 5px 0; font-size: 13px; }
        .qr-box { background: white; padding: 10px; border-radius: 10px; display: inline-block; }
        .qr-box img { width: 180px; height: 180px; display: block; }
        
        .actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-act { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-down { background: #10b981; color: white; }
        .btn-share { background: #8b5cf6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Global Pay & Business QR</h1>
    <input type="text" id="shopName" placeholder="Shop / Business Name">
    <input type="text" id="personName" placeholder="Owner Name">
    <input type="tel" id="mobileNum" placeholder="Mobile Number">
    
    <select id="bankSelect" onchange="toggleCustomBank()">
        <option value="">-- Select Bank/Wallet --</option>
        <optgroup label="🌍 Global"><option value="PayPal">PayPal</option><option value="Wise">Wise</option></optgroup>
        <optgroup label="🇵🇰 Pakistan"><option value="Easypaisa">Easypaisa</option><option value="JazzCash">JazzCash</option><option value="HBL">HBL</option></optgroup>
        <option value="Other">➕ Other</option>
    </select>
    <input type="text" id="customBankInput" placeholder="Enter Bank Name" style="display: none;">
    <input type="text" id="accountNum" placeholder="Account Number">
    
    <button class="btn-gen" onclick="validateAndGenerate()">Generate Premium Card</button>

    <div id="result-section">
        <div id="capture-area">
            <h2 id="out-shop"></h2>
            <h4>THANK YOU FOR YOUR PAYMENT</h4>
            <div class="payment-info">
                <p>Owner: <strong id="out-name"></strong></p>
                <p>Method: <strong id="out-bank"></strong></p>
                <p>A/C: <strong id="out-acc"></strong></p>
            </div>
            <div class="qr-box">
                <img id="qr-img" src="" onerror="nextProvider(this)">
            </div>
            <p style="font-size: 12px; margin-top: 15px; font-weight:bold;">SCAN & PAY - SAFE & RELIABLE</p>
        </div>
        <div class="actions">
            <button class="btn-act btn-down" onclick="downloadCard()">Download</button>
            <button class="btn-act btn-share" onclick="shareCard()">Share</button>
        </div>
    </div>
</div>

<script>
    function toggleCustomBank() {
        document.getElementById("customBankInput").style.display = (document.getElementById("bankSelect").value === "Other") ? "block" : "none";
    }

    function validateAndGenerate() {
        const shop = document.getElementById("shopName").value;
        const name = document.getElementById("personName").value;
        const bank = document.getElementById("customBankInput").value || document.getElementById("bankSelect").value;
        const acc = document.getElementById("accountNum").value;

        // Validation Logic
        if(!shop || !name || !bank || !acc) {
            alert("⚠️ Please fill all fields to generate the QR Code!");
            return;
        }

        document.getElementById("out-shop").innerText = shop;
        document.getElementById("out-name").innerText = name;
        document.getElementById("out-bank").innerText = bank;
        document.getElementById("out-acc").innerText = acc;

        const payload = `${shop}|${bank}|${acc}`;
        pIdx = 0;
        document.getElementById("qr-img").src = providers[0] + encodeURIComponent(payload);
        document.getElementById("result-section").style.display = "block";
    }

    let pIdx = 0;
    const providers = [
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://quickchart.io/qr?text=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl="
    ];

    function nextProvider(img) {
        pIdx++;
        if(pIdx < providers.length) {
            img.src = providers[pIdx] + encodeURIComponent("Retry");
        } else {
            alert("Error: Could not generate QR. Account/Service not found.");
        }
    }

    async function downloadCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"), { scale: 2 });
        const link = document.createElement("a");
        link.download = "My-Payment-Card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    async function shareCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"), { scale: 2 });
        canvas.toBlob(blob => {
            if (navigator.share) navigator.share({files: [new File([blob], "card.png", {type: "image/png"})]});
        });
    }
</script>
</body>
</html>
