<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Payment Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0f172a; }
        
        /* آؤٹ پٹ کارڈ کا نیا خوبصورت ڈیزائن (Swift Store سٹائل) */
        #capture-area { 
            background: linear-gradient(180deg, #059669 0%, #064e3b 100%); 
            padding: 30px; border-radius: 25px; text-align: center; border: 2px solid #ffffff; margin-top: 20px; color: white;
        }
        .title { font-size: 24px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { font-size: 13px; opacity: 0.9; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .info-card { text-align: left; margin: 15px 0; font-size: 14px; }
        .info-row { display: flex; justify-content: space-between; padding: 5px 0; }
        .qr-box { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin-top: 15px; }
        .qr-box img { width: 180px; height: 180px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="shopName" placeholder="Business Name">
    <input type="text" id="bankName" placeholder="Bank Name">
    <input type="text" id="accNum" placeholder="Account Number">
    <button class="btn" onclick="processCard()">Generate Premium Card</button>

    <div id="result-section" style="display:none;">
        <div id="capture-area">
            <div class="title" id="out-shop"></div>
            <div class="subtitle">THANK YOU FOR YOUR PAYMENT</div>
            <div class="info-card">
                <div class="info-row"><span>Bank:</span> <strong id="out-bank"></strong></div>
                <div class="info-row"><span>Acc:</span> <strong id="out-acc"></strong></div>
            </div>
            <div class="qr-box">
                <img id="qr-img" src="" onerror="nextProvider(this)">
            </div>
            <p style="font-size:11px; margin-top:15px; font-weight:bold;">SCAN & PAY - SAFE & RELIABLE</p>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" onclick="downloadCard()" style="background:#10b981; color:white;">Download</button>
            <button class="btn" onclick="shareCard()" style="background:#8b5cf6; color:white;">Share</button>
        </div>
    </div>
</div>

<script>
    let pIdx = 0;
    const providers = [
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://quickchart.io/qr?text=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl="
    ];

    function processCard() {
        const s = document.getElementById("shopName").value;
        const b = document.getElementById("bankName").value;
        const a = document.getElementById("accNum").value;
        
        document.getElementById("out-shop").innerText = s;
        document.getElementById("out-bank").innerText = b;
        document.getElementById("out-acc").innerText = a;
        
        const payload = `Store: ${s}, Bank: ${b}, Acc: ${a}`;
        pIdx = 0;
        document.getElementById("qr-img").src = providers[pIdx] + encodeURIComponent(payload);
        document.getElementById("result-section").style.display = "block";
    }

    function nextProvider(img) {
        pIdx++;
        if(pIdx < providers.length) {
            const s = document.getElementById("shopName").value;
            img.src = providers[pIdx] + encodeURIComponent(`Store: ${s}`);
        }
    }

    async function downloadCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"));
        const link = document.createElement("a");
        link.download = "Payment_Card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    async function shareCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"));
        canvas.toBlob(blob => {
            const file = new File([blob], "card.png", {type: "image/png"});
            if (navigator.share) navigator.share({files: [file]});
        });
    }
</script>
</body>
</html>
