<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Payment Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Premium Card Style */
        #capture-area { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #334155; margin-top: 20px;
        }
        .title { color: #38bdf8; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .info-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: left; margin: 15px 0; }
        .qr-box { background: white; padding: 10px; border-radius: 12px; display: inline-block; }
        .qr-box img { width: 180px; height: 180px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="shopName" placeholder="Business Name">
    <input type="text" id="bankName" placeholder="Bank Name">
    <input type="text" id="accNum" placeholder="Account Number">
    <button class="btn" onclick="processCard()">Generate Premium Card</button>

    <div id="result-section" style="display:none;">
        <div id="capture-area">
            <div class="title" id="out-shop"></div>
            <div class="info-card">
                <p>Bank: <strong id="out-bank"></strong></p>
                <p>Acc: <strong id="out-acc"></strong></p>
            </div>
            <div class="qr-box">
                <img id="qr-img" src="" onerror="nextProvider(this)">
            </div>
            <p style="font-size:12px; color:#94a3b8; margin-top:10px;">Scan to Pay</p>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn" onclick="downloadCard()" style="background:#10b981;">Download</button>
            <button class="btn" onclick="shareCard()" style="background:#8b5cf6;">Share</button>
        </div>
    </div>
</div>

<script>
    let pIdx = 0;
    const providers = [
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://quickchart.io/qr?text=",
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=",
        "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl="
    ];

    function processCard() {
        const s = document.getElementById("shopName").value;
        const b = document.getElementById("bankName").value;
        const a = document.getElementById("accNum").value;
        
        document.getElementById("out-shop").innerText = s;
        document.getElementById("out-bank").innerText = b;
        document.getElementById("out-acc").innerText = a;
        
        const payload = `Shop: ${s}, Bank: ${b}, Acc: ${a}`;
        pIdx = 0;
        document.getElementById("qr-img").src = providers[pIdx] + encodeURIComponent(payload);
        document.getElementById("result-section").style.display = "block";
    }

    function nextProvider(img) {
        pIdx++;
        if(pIdx < providers.length) {
            const s = document.getElementById("shopName").value;
            img.src = providers[pIdx] + encodeURIComponent(`Shop: ${s}`);
        }
    }

    async function downloadCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"));
        const link = document.createElement("a");
        link.download = "My_Business_Card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    async function shareCard() {
        const canvas = await html2canvas(document.getElementById("capture-area"));
        canvas.toBlob(blob => {
            const file = new File([blob], "card.png", {type: "image/png"});
            if (navigator.share) navigator.share({files: [file]});
        });
    }
</script>
</body>
</html>
