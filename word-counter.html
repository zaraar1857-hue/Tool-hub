<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: #fff; padding: 20px; text-align: center; }
        .tool-container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #1e293b; color: white; font-size: 16px; resize: none; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .stats div { font-size: 18px; font-weight: 600; color: #38bdf8; }
        .back-btn { display: inline-block; margin-top: 20px; color: #cbd5e1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="tool-container">
    <h1>Word Counter</h1>
    <textarea id="textInput" oninput="countWords()" placeholder="Type or paste your text here..."></textarea>
    
    <div class="stats">
        <div>Words: <span id="wordCount">0</span></div>
        <div>Characters: <span id="charCount">0</span></div>
    </div>
    
    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
    function countWords() {
        const text = document.getElementById("textInput").value;
        const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length;
        const chars = text.length;
        
        document.getElementById("wordCount").innerText = words;
        document.getElementById("charCount").innerText = chars;
    }
</script>
</body>
</html>
