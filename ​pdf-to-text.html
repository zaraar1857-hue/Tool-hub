<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Text - Tool Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { background: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; width: 100%; max-width: 600px; text-align: center; }
        h2 { margin-bottom: 20px; }
        #pdfInput { margin: 20px 0; width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white; cursor: pointer; }
        #output { width: 100%; height: 200px; margin-top: 20px; background: rgba(0,0,0,0.3); border: 1px solid #38bdf8; border-radius: 12px; color: #cbd5e1; padding: 15px; resize: none; }
        .btn { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 15px; border-radius: 12px; color: white; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

<div class="tool-card">
    <h2>PDF to Text</h2>
    <input type="file" id="pdfInput" accept="application/pdf">
    <button class="btn" onclick="extractText()">Extract Text</button>
    <textarea id="output" readonly placeholder="Extracted text will appear here..."></textarea>
</div>

<script>
    async function extractText() {
        const fileInput = document.getElementById('pdfInput');
        const output = document.getElementById('output');
        
        if (fileInput.files.length === 0) { alert("Please select a PDF file!"); return; }

        const file = fileInput.files[0];
        const reader = new FileReader();
        
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let fullText = "";
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ");
            }
            output.value = fullText;
        };
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
