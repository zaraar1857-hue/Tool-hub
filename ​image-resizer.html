<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: #fff; padding: 20px; text-align: center; }
        .tool-container { max-width: 500px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #38bdf8; }
        input { margin: 10px 0; padding: 10px; width: 100%; border-radius: 8px; border: none; }
        button { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 15px; color: white; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        canvas { display: none; }
        .back-btn { display: inline-block; margin-top: 20px; color: #cbd5e1; text-decoration: none; }
    </style>
</head>
<body>

<div class="tool-container">
    <h1>Image Resizer</h1>
    <input type="file" id="upload" accept="image/*">
    <input type="number" id="width" placeholder="Width (px)">
    <input type="number" id="height" placeholder="Height (px)">
    <button onclick="resizeImage()">Resize & Download</button>
    <canvas id="canvas"></canvas>
    <br>
    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
    function resizeImage() {
        const file = document.getElementById('upload').files[0];
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;
        if (!file || !width || !height) return alert("Please select image and enter dimensions!");

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.getElementById('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const link = document.createElement('a');
                link.download = 'resized-image.png';
                link.href = canvas.toDataURL();
                link.click();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
