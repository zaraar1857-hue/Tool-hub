<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Tool Hub</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { background: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; text-align: center; }
        h2 { margin-bottom: 20px; }
        #pdfInput { margin: 20px 0; width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white; cursor: pointer; }
        .btn { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 18px; border-radius: 12px; color: white; cursor: pointer; width: 100%; font-size: 18px; font-weight: 600; }
    </style>
</head>
<body>

<div class="tool-card">
    <h2>PDF Merger</h2>
    <input type="file" id="pdfInput" accept="application/pdf" multiple>
    <button class="btn" onclick="mergePDFs()">Merge & Download</button>
</div>

<script>
    async function mergePDFs() {
        const fileInput = document.getElementById('pdfInput');
        if (fileInput.files.length < 2) { alert("Please select at least 2 PDF files!"); return; }

        const mergedPdf = await PDFLib.PDFDocument.create();
        
        for (const file of fileInput.files) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
            const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
            copiedPages.forEach((page) => mergedPdf.addPage(page));
        }

        const mergedPdfBytes = await mergedPdf.save();
        const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'merged_files.pdf';
        link.click();
    }
</script>

</body>
</html>
