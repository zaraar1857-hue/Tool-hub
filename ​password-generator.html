<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Tool Hub</title>
    <style>
        body { background: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; text-align: center; }
        h2 { margin-bottom: 20px; }
        #passwordBox { margin: 20px 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid #38bdf8; border-radius: 12px; color: #fff; font-size: 20px; text-align: center; font-weight: bold; }
        .btn { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 18px; border-radius: 12px; color: white; cursor: pointer; width: 100%; font-size: 18px; font-weight: 600; }
    </style>
</head>
<body>

<div class="tool-card">
    <h2>Password Generator</h2>
    <input type="text" id="passwordBox" readonly placeholder="Click to generate">
    <button class="btn" onclick="generatePassword()">Generate Password</button>
</div>

<script>
    function generatePassword() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
        let password = "";
        for (let i = 0; i < 12; i++) {
            password += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        document.getElementById("passwordBox").value = password;
    }
</script>

</body>
</html>
