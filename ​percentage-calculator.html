<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator - Tool Hub</title>
    <style>
        body { background: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; text-align: center; }
        h2 { margin-bottom: 20px; }
        input { margin: 10px 0; width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; }
        .btn { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 18px; border-radius: 12px; color: white; cursor: pointer; width: 100%; font-size: 18px; font-weight: 600; margin-top: 15px; }
        #result { margin-top: 20px; font-size: 20px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div class="tool-card">
    <h2>Percentage Calculator</h2>
    <input type="number" id="part" placeholder="Part (e.g. 80)">
    <input type="number" id="total" placeholder="Total (e.g. 100)">
    <button class="btn" onclick="calculate()">Calculate</button>
    <div id="result">Result: --</div>
</div>

<script>
    function calculate() {
        const part = document.getElementById('part').value;
        const total = document.getElementById('total').value;
        if (part === "" || total === "" || total == 0) { alert("Please enter valid numbers!"); return; }
        
        const percentage = (part / total) * 100;
        document.getElementById('result').innerText = "Result: " + percentage.toFixed(2) + "%";
    }
</script>

</body>
</html>
