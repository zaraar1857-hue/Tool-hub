<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - Tool Hub</title>
    <style>
        body { background: #0b1120; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .tool-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); padding: 40px; border-radius: 24px; width: 100%; max-width: 600px; text-align: center; }
        h2 { margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; resize: none; font-size: 16px; }
        .stats { margin-top: 20px; display: flex; justify-content: space-around; font-weight: 600; color: #38bdf8; }
    </style>
</head>
<body>

<div class="tool-card">
    <h2>Word Counter</h2>
    <textarea id="textInput" placeholder="Type or paste your text here..." oninput="countWords()"></textarea>
    <div class="stats">
        <p>Words: <span id="wordCount">0</span></p>
        <p>Characters: <span id="charCount">0</span></p>
    </div>
</div>

<script>
    function countWords() {
        const text = document.getElementById('textInput').value.trim();
        const words = text === "" ? 0 : text.split(/\s+/).length;
        const chars = text.length;
        
        document.getElementById('wordCount').innerText = words;
        document.getElementById('charCount').innerText = chars;
    }
</script>

</body>
</html>
