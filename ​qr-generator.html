<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0b1120; color: #fff; padding: 20px; text-align: center; }
        .tool-container { max-width: 500px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        input { margin: 10px 0; padding: 15px; width: 100%; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: linear-gradient(90deg, #38bdf8, #8b5cf6); border: none; padding: 15px; color: white; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 10px; width: fit-content; }
        .back-btn { display: inline-block; margin-top: 20px; color: #cbd5e1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="tool-container">
    <h1>QR Code Generator</h1>
    <input type="text" id="text" placeholder="Enter text or link here...">
    <button onclick="generateQR()">Generate QR Code</button>
    
    <div id="qrcode"></div>
    
    <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
    function generateQR() {
        const text = document.getElementById("text").value;
        const qrDiv = document.getElementById("qrcode");
        qrDiv.innerHTML = "";
        if (text.trim() === "") {
            alert("Please enter some text!");
            return;
        }
        new QRCode(qrDiv, {
            text: text,
            width: 200,
            height: 200
        });
    }
</script>
</body>
</html>
